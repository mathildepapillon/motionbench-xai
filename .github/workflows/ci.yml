name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dev dependencies
        run: pip install ruff mypy types-tqdm
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy motionbench/

  test:
    name: Test (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package + dev deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" --no-deps
          pip install pytest pytest-cov captum shap quantus zennit numpy scipy scikit-learn
      - name: Run contract tests
        run: pytest tests/ -m "not slow and not gpu and not manual" -v --tb=short
      - name: Run smoke test
        run: python examples/smoke_test.py

  smoke-test:
    name: End-to-end smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" --no-deps
          pip install pytest captum shap quantus zennit numpy scipy scikit-learn
      - name: Smoke test
        run: python examples/smoke_test.py
