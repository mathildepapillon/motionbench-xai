name: motionbench-xai
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch=2.1.*
  - torchvision=0.16.*
  - pytorch-cuda=12.1
  - numpy>=1.26,<2
  - scipy>=1.11
  - scikit-learn>=1.4
  - pandas>=2.1
  - matplotlib>=3.8
  - tqdm>=4.66
  - pip:
    - captum>=0.7.0
    - zennit>=0.4.6
    - quantus>=0.5.5
    - shap>=0.46.0
    - timeshap>=0.4.0
    - windowshap>=1.0
    - pyvinecopulib>=0.6.3
    - hydra-core>=1.3
    - omegaconf>=2.3
    - wandb>=0.17
    - einops>=0.7
    - aeon>=0.9
    - joblib>=1.3
    - rich>=13.0
    - pytest>=8.0
    - pytest-cov>=5.0
    - ruff>=0.4.0
    - mypy>=1.9
    - pre-commit>=3.7
    - types-tqdm
    - -e .
