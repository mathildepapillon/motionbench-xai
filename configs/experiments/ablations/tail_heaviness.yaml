pipeline: synthetic

# Ablation: compare Gaussian (light-tailed) vs Burr (heavy-tailed) marginals
datasets:
  - gaussian_k4
  - burr_m5

methods:
  - kernelshap_zero
  - kernelshap_empirical
  - kernelshap_vaeac
  - kernelshap_flow

