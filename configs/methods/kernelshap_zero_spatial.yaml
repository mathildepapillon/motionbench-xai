name: kernelshap_zero_spatial
# Off-manifold baseline with spatial players — shows that wrong imputer
# hurts even when player abstraction is correct.
attributor:
  _target_: motionbench.attribution.kernel_shap.KernelShapAttributor
imputer:
  _target_: motionbench.imputers.off_manifold.ZeroImputer
players:
  _target_: motionbench.players.spatial_joints.SpatialJoints
n_kernel_samples: 64
n_completion_samples: 5
seed: 42
