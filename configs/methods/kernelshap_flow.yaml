name: kernelshap_flow
attributor:
  _target_: motionbench.attribution.kernel_shap.KernelShapAttributor
imputer:
  _target_: motionbench.imputers.carepd_imputer.CarepdFlowImputer
  # 50 ODE steps is a reasonable speed/quality tradeoff for benchmarking.
  # Full quality uses num_steps=100 but that doubles per-sample compute time.
  num_steps: 20   # 20 steps sufficient for quality vs speed tradeoff in sweep
players:
  _target_: motionbench.players.temporal_windows.TemporalWindows
n_kernel_samples: 16   # K=4 → 2^4=16 exact coalitions
n_completion_samples: 3
seed: 42
