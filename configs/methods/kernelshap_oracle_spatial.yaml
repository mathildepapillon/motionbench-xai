name: kernelshap_oracle_spatial
# Oracle imputer with spatial (per-joint) players — ground truth upper bound
# for spatially-localized attribution tasks.
attributor:
  _target_: motionbench.attribution.kernel_shap.KernelShapAttributor
imputer:
  _target_: motionbench.oracles.gaussian_oracle.GaussianOracle
players:
  _target_: motionbench.players.spatial_joints.SpatialJoints
n_kernel_samples: 64
n_completion_samples: 10
seed: 42
