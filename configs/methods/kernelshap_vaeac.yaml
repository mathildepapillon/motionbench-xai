name: kernelshap_vaeac
attributor:
  _target_: motionbench.attribution.kernel_shap.KernelShapAttributor
imputer:
  _target_: motionbench.imputers.vaeac.VAEACImputer
  # J, F, T filled at runtime from dataset shape
  latent_dim: 32
  hidden_dim: 64
train_epochs: 0         # 0 = skip training (smoke test); set >0 for production
players:
  _target_: motionbench.players.temporal_windows.TemporalWindows
n_kernel_samples: 64
n_completion_samples: 5
seed: 42
# GPU is preferred for VAEAC training; set in experiment config or override
device: cpu
